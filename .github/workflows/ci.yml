on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test unit tests
        run: dotnet test TCSA.V2026.UnitTests/TCSA.V2026.UnitTests.csproj --no-build -c Release --verbosity normal

      - name: Test integration tests
        run: dotnet test TCSA.2026.IntegrationTests/TCSA.V2026.IntegrationTests.csproj --no-build -c Release --verbosity normal --filter "TestCategory!=ExternalApi"
